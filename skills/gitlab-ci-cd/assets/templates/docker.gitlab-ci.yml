# Docker CI/CD Pipeline Template
# Generated by gitlab-ci-cd

stages:
  - build
  - test
  - deploy

variables:
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_NAME: $CI_REGISTRY_IMAGE

default:
  services:
    - name: docker:dind
      alias: docker
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ── Build ──────────────────────────────────────────────────────────

docker-login:
  stage: build
  image: alpine
  before_script:
    - apk add --no-cache docker
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

docker-build:
  stage: build
  image: docker:24-dind
  cache:
    key: ${CI_COMMIT_REF_SLUG}-docker
    paths:
      - .docker-cache/
    policy: pull-push
  script:
    - docker build
      --cache-from $IMAGE_NAME:buildcache
      --cache-from $IMAGE_NAME:latest
      -t $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
      -t $IMAGE_NAME:latest
      --build-arg BUILDKIT_INLINE_CACHE=1
      .
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

docker-push:
  stage: build
  image: docker:24-dind
  script:
    - docker push $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - docker push $IMAGE_NAME:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# ── Test ───────────────────────────────────────────────────────────

docker-lint:
  stage: test
  image: docker:24-dind
  before_script:
    - apk add --no-cache curl
    - curl -sSfL https://github.com/projectatomic/dockerfile_lint/releases/download/v1.0.1/dockerfile_lint -o dockerfile_lint
    - chmod +x dockerfile_lint
  script:
    - ./dockerfile_lint Dockerfile
  allow_failure: true
  needs: []

# ── Deploy ─────────────────────────────────────────────────────────

deploy-staging:
  stage: deploy
  script:
    - echo "Deploying $IMAGE_NAME:$CI_COMMIT_SHORT_SHA to staging..."
  environment:
    name: staging
    url: https://staging.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-production:
  stage: deploy
  script:
    - echo "Deploying $IMAGE_NAME:$CI_COMMIT_TAG to production..."
  environment:
    name: production
    url: https://www.example.com
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual
