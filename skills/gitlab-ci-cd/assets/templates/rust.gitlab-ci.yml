# Rust CI/CD Pipeline Template
# Generated by gitlab-ci-cd

stages:
  - build
  - test
  - deploy

default:
  image: rust:1.75-slim
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ── Build ──────────────────────────────────────────────────────────

build:
  stage: build
  cache:
    key: ${CI_COMMIT_REF_SLUG}-cargo
    paths:
      - target/
    policy: pull-push
  script:
    - cargo build --release
  artifacts:
    paths:
      - target/release/
    expire_in: 1 week

# ── Test ───────────────────────────────────────────────────────────

clippy:
  stage: test
  script:
    - cargo clippy -- -D warnings
  allow_failure: true
  needs: []

unit-test:
  stage: test
  script:
    - cargo test
  artifacts:
    reports:
      junit: target/test-results.xml
    expire_in: 1 week
  needs: []

# ── Deploy ─────────────────────────────────────────────────────────

deploy-staging:
  stage: deploy
  script:
    - echo "Deploying to staging..."
  environment:
    name: staging
    url: https://staging.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-production:
  stage: deploy
  script:
    - echo "Deploying to production..."
  environment:
    name: production
    url: https://www.example.com
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual
