# Go CI/CD Pipeline Template
# Generated by gitlab-ci-cd

stages:
  - build
  - test
  - deploy

default:
  image: golang:1.22-alpine
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ── Build ──────────────────────────────────────────────────────────

install-modules:
  stage: build
  cache:
    key: ${CI_COMMIT_REF_SLUG}-gomod
    paths:
      - .cache/go-mod/
    policy: pull-push
  script:
    - mkdir -p .cache/go-mod
    - export GOMODCACHE=$CI_PROJECT_DIR/.cache/go-mod
    - go mod download
  artifacts:
    paths:
      - .cache/go-mod/
    expire_in: 1 hour

build:
  stage: build
  script:
    - export GOMODCACHE=$CI_PROJECT_DIR/.cache/go-mod
    - go build -o bin/app ./...
  artifacts:
    paths:
      - bin/
    expire_in: 1 week
  needs:
    - install-modules
      artifacts: true

# ── Test ───────────────────────────────────────────────────────────

vet:
  stage: test
  script:
    - go vet ./...
  allow_failure: true
  needs:
    - install-modules
      artifacts: true

unit-test:
  stage: test
  script:
    - go test -v -coverprofile=coverage.out -json ./... | tee test-results.json
  artifacts:
    reports:
      coverage_report:
        coverage_format: gocover
        path: coverage.out
    expire_in: 1 week
  coverage: '/^.*\s*(\d+\.\d+)%/'
  needs:
    - install-modules
      artifacts: true

# ── Deploy ─────────────────────────────────────────────────────────

deploy-staging:
  stage: deploy
  script:
    - echo "Deploying to staging..."
  environment:
    name: staging
    url: https://staging.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-production:
  stage: deploy
  script:
    - echo "Deploying to production..."
  environment:
    name: production
    url: https://www.example.com
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual
