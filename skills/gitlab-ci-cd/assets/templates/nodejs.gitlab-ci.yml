# Node.js CI/CD Pipeline Template
# Generated by gitlab-ci-cd

stages:
  - build
  - test
  - deploy

variables:
  NODE_ENV: production

default:
  image: node:20-alpine
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ── Build ──────────────────────────────────────────────────────────

install-dependencies:
  stage: build
  cache:
    key: ${CI_COMMIT_REF_SLUG}-npm
    paths:
      - .npm/
    policy: pull-push
  before_script:
    - mkdir -p .npm
    - export npm_config_cache=$CI_PROJECT_DIR/.npm
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/
      - .npm/
    expire_in: 1 hour

build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  needs:
    - install-dependencies
      artifacts: true

# ── Test ───────────────────────────────────────────────────────────

lint:
  stage: test
  script:
    - npm run lint
  needs:
    - install-dependencies
      artifacts: true
  allow_failure: true

unit-test:
  stage: test
  script:
    - npm test -- --ci --coverage
  artifacts:
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/coverage.xml
    expire_in: 1 week
  coverage: '/All files[^|]*\\|[^|]*\\s*([\\d\\.]+)/'
  needs:
    - install-dependencies
      artifacts: true

# ── Deploy ─────────────────────────────────────────────────────────

deploy-staging:
  stage: deploy
  script:
    - echo "Deploying to staging..."
    - echo "Add your deployment commands here"
  environment:
    name: staging
    url: https://staging.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-production:
  stage: deploy
  script:
    - echo "Deploying to production..."
    - echo "Add your deployment commands here"
  environment:
    name: production
    url: https://www.example.com
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual
