# Python CI/CD Pipeline Template
# Generated by gitlab-ci-cd

stages:
  - build
  - test
  - deploy

default:
  image: python:3.12-slim
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ── Build ──────────────────────────────────────────────────────────

install-dependencies:
  stage: build
  cache:
    key: ${CI_COMMIT_REF_SLUG}-pip
    paths:
      - .cache/pip/
    policy: pull-push
  script:
    - pip install --cache-dir .cache/pip -r requirements.txt
  artifacts:
    paths:
      - .cache/pip/
    expire_in: 1 hour

# ── Test ───────────────────────────────────────────────────────────

lint:
  stage: test
  script:
    - pip install ruff || pip install flake8
    - ruff check . || flake8 .
  allow_failure: true
  needs:
    - install-dependencies
      artifacts: true

unit-test:
  stage: test
  script:
    - pip install pytest pytest-cov
    - pytest --junitxml=junit.xml --cov=. --cov-report=xml
  artifacts:
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  needs:
    - install-dependencies
      artifacts: true

# ── Deploy ─────────────────────────────────────────────────────────

deploy-staging:
  stage: deploy
  script:
    - echo "Deploying to staging..."
    - echo "Add your deployment commands here"
  environment:
    name: staging
    url: https://staging.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-production:
  stage: deploy
  script:
    - echo "Deploying to production..."
  environment:
    name: production
    url: https://www.example.com
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual
